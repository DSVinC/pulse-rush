    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      worldWidth = window.innerWidth;
      worldHeight = window.innerHeight;
      canvas.width = Math.floor(worldWidth * dpr);
      canvas.height = Math.floor(worldHeight * dpr);
      canvas.style.width = worldWidth + "px";
      canvas.style.height = worldHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      buildStars();
      if (state.mode === "playing") {
        player.y = getTrackSurfaceY(player.inverted) + (player.inverted ? player.size * 0.5 : -player.size * 0.5);
      }
    }

    function buildStars() {
      state.stars = Array.from({ length: 54 }, (_, i) => ({
        x: (i * 197) % Math.max(1, worldWidth),
        y: (i * 131) % Math.max(1, worldHeight),
        r: 1 + (i % 3),
        speed: 12 + (i % 5) * 7
      }));
    }

    function getTrackSurfaceY(inverted) {
      return inverted ? 112 : worldHeight - 150;
    }

    function rand(seed) {
      const x = Math.sin(seed * 12.9898) * 43758.5453;
      return x - Math.floor(x);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function getPlayerWorldX() {
      return state.cameraX + player.x;
    }

    function formatTime(sec) {
      const minutes = Math.floor(sec / 60);
      const seconds = (sec % 60).toFixed(2).padStart(5, "0");
      return `${minutes}:${seconds}`;
    }

    function getLevelProgress(level, elapsed) {
      if (!Number.isFinite(level.duration)) return 0;
      return clamp(elapsed / level.duration, 0, 1);
    }

    function getCurrentBpm(level, elapsed) {
      const span = Number.isFinite(level.duration) ? getLevelProgress(level, elapsed) : clamp(elapsed / 150, 0, 1);
      return lerp(level.bpmStart, level.bpmEnd, span);
    }

    function getCurrentSpeed(level, elapsed) {
      const span = Number.isFinite(level.duration) ? getLevelProgress(level, elapsed) : clamp(elapsed / 160, 0, 1);
      const base = lerp(level.baseSpeed, level.maxSpeed, span);
      return base * (player.boostTimer > 0 ? 1.5 : 1);
    }

    function ensureAudio() {
      if (audioState.ctx) return;
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      audioState.ctx = new AudioCtx();

      audioState.master = audioState.ctx.createGain();
      audioState.master.gain.value = audioState.muted ? 0 : 0.35 * audioState.volume;

      audioState.filterNode = audioState.ctx.createBiquadFilter();
      audioState.filterNode.type = "lowpass";
      audioState.filterNode.frequency.value = 2000;
      audioState.filterNode.Q.value = 5;

      audioState.bassGain = audioState.ctx.createGain();
      audioState.bassGain.gain.value = 0.28;
      audioState.bassGain.connect(audioState.master);

      audioState.leadGain = audioState.ctx.createGain();
      audioState.leadGain.gain.value = 0.18;
      audioState.leadGain.connect(audioState.filterNode);
      audioState.filterNode.connect(audioState.master);

      audioState.noiseGain = audioState.ctx.createGain();
      audioState.noiseGain.gain.value = 0.08;
      audioState.noiseGain.connect(audioState.master);

      const bgmMaster = audioState.ctx.createGain();
      const subGain = audioState.ctx.createGain();
      const drumGain = audioState.ctx.createGain();
      const padGain = audioState.ctx.createGain();
      const arpGain = audioState.ctx.createGain();
      const leadGain = audioState.ctx.createGain();
      const leadFilter = audioState.ctx.createBiquadFilter();
      const padFilter = audioState.ctx.createBiquadFilter();

      bgmMaster.gain.value = 0.0001;
      subGain.gain.value = 0.22;
      drumGain.gain.value = 0.24;
      padGain.gain.value = 0.14;
      arpGain.gain.value = 0.12;
      leadGain.gain.value = 0.18;

      leadFilter.type = "lowpass";
      leadFilter.frequency.value = 1400;
      leadFilter.Q.value = 8;

      padFilter.type = "lowpass";
      padFilter.frequency.value = 900;
      padFilter.Q.value = 0.8;

      subGain.connect(bgmMaster);
      drumGain.connect(bgmMaster);
      padGain.connect(padFilter);
      padFilter.connect(bgmMaster);
      arpGain.connect(leadFilter);
      leadGain.connect(leadFilter);
      leadFilter.connect(bgmMaster);
      bgmMaster.connect(audioState.master);

      audioState.bgm = {
        master: bgmMaster,
        subGain,
        drumGain,
        padGain,
        arpGain,
        leadGain,
        leadFilter,
        padFilter,
        chordIndex: 0
      };

      audioState.master.connect(audioState.ctx.destination);
      applyAudioSettings();
    }

    function unlockAudio() {
      ensureAudio();
      audioState.unlocked = true;
      if (audioState.ctx.state === "suspended") {
        audioState.ctx.resume();
      }
      if (state.mode === "playing") {
        startMusic();
      }
    }

    function startMusic() {
      ensureAudio();
      if (!audioState.unlocked || audioState.musicOn) return;
      if (audioState.ctx.state === "suspended") {
        audioState.ctx.resume();
      }
      audioState.musicOn = true;
      audioState.nextNoteTime = audioState.ctx.currentTime + 0.02;
      audioState.scheduledStep = 0;
      audioState.arpIndex = 0;
      if (audioState.bgm) {
        audioState.bgm.master.gain.cancelScheduledValues(audioState.ctx.currentTime);
        audioState.bgm.master.gain.setValueAtTime(audioState.bgm.master.gain.value, audioState.ctx.currentTime);
        audioState.bgm.master.gain.exponentialRampToValueAtTime(audioState.muted ? 0.0001 : 0.62 * Math.max(audioState.volume, 0.0001), audioState.ctx.currentTime + 0.45);
      }
      audioState.timer = setInterval(scheduleMusic, 25);
    }

    function stopMusic() {
      audioState.musicOn = false;
      if (audioState.bgm && audioState.ctx) {
        const now = audioState.ctx.currentTime;
        audioState.bgm.master.gain.cancelScheduledValues(now);
        audioState.bgm.master.gain.setValueAtTime(Math.max(audioState.bgm.master.gain.value, 0.0001), now);
        audioState.bgm.master.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
      }
      if (audioState.timer) {
        clearInterval(audioState.timer);
        audioState.timer = null;
      }
    }

    function playTone(type, frequency, duration, when, volume, sweep = 0, destination = null) {
      if (!audioState.ctx) return;
      const osc = audioState.ctx.createOscillator();
      const gain = audioState.ctx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, when);
      if (sweep) osc.frequency.exponentialRampToValueAtTime(Math.max(40, frequency + sweep), when + duration);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(volume, when + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
      osc.connect(gain);
      gain.connect(destination || audioState.master);
      osc.start(when);
      osc.stop(when + duration + 0.02);
    }

    function playNoise(duration, when, volume, filterFreq = 8000, destination = null) {
      if (!audioState.ctx) return;
      const bufferSize = audioState.ctx.sampleRate * duration;
      const buffer = audioState.ctx.createBuffer(1, bufferSize, audioState.ctx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      const noise = audioState.ctx.createBufferSource();
      noise.buffer = buffer;
      
      const filter = audioState.ctx.createBiquadFilter();
      filter.type = "highpass";
      filter.frequency.value = filterFreq;
      
      const gain = audioState.ctx.createGain();
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(volume, when + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
      
      noise.connect(filter);
      filter.connect(gain);
      gain.connect(destination || audioState.noiseGain);
      noise.start(when);
      noise.stop(when + duration + 0.02);
    }

    function playArp(baseFreq, when, volume, duration = 0.12) {
      if (!audioState.ctx) return;
      const arpPattern = [0, 3, 7, 10, 12, 7, 3, 10];
      const noteIndex = audioState.arpIndex % arpPattern.length;
      const freq = baseFreq * Math.pow(2, arpPattern[noteIndex] / 12);
      audioState.arpIndex++;
      
      const osc = audioState.ctx.createOscillator();
      const gain = audioState.ctx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(freq, when);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(volume, when + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
      osc.connect(gain);
      gain.connect(audioState.bgm ? audioState.bgm.arpGain : audioState.leadGain);
      osc.start(when);
      osc.stop(when + duration + 0.04);
    }

    function getMusicProfile() {
      const level = state.activeLevel;
      const progress = level
        ? Number.isFinite(level.duration)
          ? getLevelProgress(level, state.elapsed)
          : clamp(state.elapsed / 180, 0, 1)
        : 0;
      const combo = clamp(state.combo / 18, 0, 1);
      const boost = player.boostTimer > 0 ? clamp(player.boostTimer / 1.5, 0.35, 1) : 0;
      const energy = clamp(progress * 0.55 + combo * 0.25 + boost * 0.2, 0, 1);
      return { progress, combo, boost, energy };
    }

    function getChordStack(step) {
      const progression = [
        [0, 3, 7],
        [5, 8, 12],
        [7, 10, 14],
        [3, 7, 10]
      ];
      return progression[Math.floor(step / 16) % progression.length];
    }

    function playKick(when, energy) {
      playTone("sine", 62, 0.16, when, 0.24 + energy * 0.08, -28, audioState.bgm.drumGain);
      playTone("triangle", 110, 0.05, when, 0.08 + energy * 0.03, -55, audioState.bgm.drumGain);
    }

    function playSnare(when, energy) {
      playNoise(0.12, when, 0.08 + energy * 0.04, 1800, audioState.bgm.drumGain);
      playTone("triangle", 210, 0.08, when, 0.04 + energy * 0.02, -70, audioState.bgm.drumGain);
    }

    function playHiHat(when, energy, open = false) {
      playNoise(open ? 0.09 : 0.035, when, (open ? 0.05 : 0.03) + energy * 0.03, open ? 7200 : 9500, audioState.bgm.drumGain);
    }

    function playPad(rootFreq, chord, when, energy) {
      const duration = 1.9;
      chord.forEach((interval, index) => {
        const osc = audioState.ctx.createOscillator();
        const gain = audioState.ctx.createGain();
        osc.type = index === 0 ? "triangle" : "sine";
        const freq = rootFreq * Math.pow(2, interval / 12);
        osc.frequency.setValueAtTime(freq, when);
        gain.gain.setValueAtTime(0.0001, when);
        gain.gain.linearRampToValueAtTime(0.018 + energy * 0.024, when + 0.35);
        gain.gain.linearRampToValueAtTime(0.0001, when + duration);
        osc.connect(gain);
        gain.connect(audioState.bgm.padGain);
        osc.start(when);
        osc.stop(when + duration + 0.08);
      });
    }

    function playLead(rootFreq, when, energy, boost) {
      const duration = 0.18;
      const osc = audioState.ctx.createOscillator();
      const gain = audioState.ctx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(rootFreq, when);
      osc.detune.setValueAtTime(boost * 18, when);
      osc.frequency.exponentialRampToValueAtTime(rootFreq * (1.18 + energy * 0.12), when + duration);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(0.06 + energy * 0.06 + boost * 0.04, when + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + duration);
      audioState.bgm.leadFilter.frequency.setValueAtTime(900 + energy * 2300 + boost * 1800, when);
      audioState.bgm.leadFilter.frequency.exponentialRampToValueAtTime(1200 + energy * 3000 + boost * 2200, when + duration);
      osc.connect(gain);
      gain.connect(audioState.bgm.leadGain);
      osc.start(when);
      osc.stop(when + duration + 0.04);
    }

    function scheduleMusic() {
      if (!audioState.musicOn || !state.activeLevel || state.mode !== "playing" || !audioState.bgm) return;

      const profile = getMusicProfile();
      audioState.intensity = profile.energy;
      const padCutoff = 700 + profile.energy * 900 + profile.boost * 500;
      audioState.bgm.padFilter.frequency.setTargetAtTime(padCutoff, audioState.ctx.currentTime, 0.12);

      while (audioState.nextNoteTime < audioState.ctx.currentTime + audioState.lookAhead) {
        const step = audioState.scheduledStep;
        const level = state.activeLevel;
        const bpm = getCurrentBpm(level, state.elapsed);
        const stepSec = 60 / bpm / 4;
        const beat = Math.floor(step / 4);
        const beatInBar = beat % 4;
        const stepInBeat = step % 4;
        const chord = getChordStack(step);
        const when = audioState.nextNoteTime;
        const bassRoot = 41.2 * Math.pow(2, chord[0] / 12);

        if (stepInBeat === 0) {
          playTone("sine", clamp(bassRoot, 40, 78), 0.32, when, 0.16 + profile.energy * 0.08 + profile.boost * 0.04, 0, audioState.bgm.subGain);
          playKick(when, profile.energy);
          if (beatInBar === 0 || profile.energy > 0.55) {
            playLead(155.56 * Math.pow(2, chord[1] / 12), when, profile.energy, profile.boost);
          }
        }

        if (beatInBar === 1 && stepInBeat === 0) {
          playSnare(when, profile.energy);
        }

        if (beatInBar === 2 && stepInBeat === 0) {
          playKick(when, profile.energy * 0.9);
        }

        if (beatInBar === 3 && stepInBeat === 0) {
          playSnare(when, profile.energy + profile.boost * 0.2);
        }

        if (step % 2 === 0) {
          playHiHat(when, profile.energy, profile.energy > 0.72 && stepInBeat === 2);
        }

        if (profile.energy > 0.22 && step % 2 === 0) {
          const arpRoot = 82.41 * Math.pow(2, chord[Math.floor(step / 2) % chord.length] / 12);
          playArp(arpRoot * (profile.boost > 0 ? 2 : 1), when, 0.035 + profile.energy * 0.05 + profile.combo * 0.03, 0.1);
        }

        if (step % 16 === 0) {
          playPad(82.41, chord, when, profile.energy + profile.boost * 0.2);
        }

        audioState.nextNoteTime += stepSec;
        audioState.scheduledStep += 1;
      }
    }

    function playSfx(name) {
      ensureAudio();
      if (audioState.muted || audioState.volume <= 0) return;
      if (audioState.ctx.state === "suspended") audioState.ctx.resume();
      const now = audioState.ctx.currentTime;
      
      if (name === "jump") {
        // 能量脉冲感 - 频率扫频上升 + 滤波器
        const osc = audioState.ctx.createOscillator();
        const gain = audioState.ctx.createGain();
        const filter = audioState.ctx.createBiquadFilter();
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(400, now);
        filter.frequency.exponentialRampToValueAtTime(3500, now + 0.1);
        filter.Q.value = 8;
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(180, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.12);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioState.master);
        osc.start(now);
        osc.stop(now + 0.14);
        // 高频泛音
        playTone("sine", 1200, 0.06, now + 0.02, 0.06, 400);
      } else if (name === "death") {
        playNoise(0.2, now, 0.07, 2600);
        for (let i = 0; i < 14; i += 1) {
          const t = now + i * 0.022;
          playTone("triangle", 1400 - i * 70, 0.06, t, 0.035 + (14 - i) * 0.002, -420);
          playTone("sine", 620 + i * 45, 0.04, t + 0.004, 0.02, 180);
        }
        playTone("sawtooth", 220, 0.18, now, 0.05, -150);
        playNoise(0.32, now + 0.04, 0.08, 5200);
      } else if (name === "clear") {
        // 胜利和弦 - 赛博朋克风格
        const freqs = [440, 554, 659, 880]; // A 大调和弦
        freqs.forEach((f, i) => {
          playTone("sine", f, 0.25, now + i * 0.08, 0.12, 80);
          playTone("triangle", f * 2, 0.18, now + i * 0.08 + 0.05, 0.06, 120);
        });
        // 高频闪光
        playTone("sine", 1760, 0.3, now + 0.25, 0.08, 200);
      } else if (name === "checkpoint") {
        // 能量充能声 - 和弦 + 泛音
        playTone("sine", 523, 0.12, now, 0.14, 100); // C5
        playTone("sine", 659, 0.12, now + 0.04, 0.12, 80); // E5
        playTone("sine", 784, 0.15, now + 0.08, 0.1, 60); // G5
        // 数字化闪烁
        playTone("square", 1568, 0.08, now + 0.12, 0.06, 200);
      } else if (name === "portal") {
        // 传送门漩涡 - 双振荡器 + 相位调制
        const osc1 = audioState.ctx.createOscillator();
        const osc2 = audioState.ctx.createOscillator();
        const gain = audioState.ctx.createGain();
        osc1.type = "sine";
        osc1.frequency.setValueAtTime(220, now);
        osc1.frequency.exponentialRampToValueAtTime(880, now + 0.15);
        osc1.frequency.exponentialRampToValueAtTime(110, now + 0.25);
        osc2.type = "sawtooth";
        osc2.frequency.setValueAtTime(165, now);
        osc2.frequency.exponentialRampToValueAtTime(440, now + 0.18);
        osc2.frequency.exponentialRampToValueAtTime(82, now + 0.28);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.15, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(audioState.master);
        osc1.start(now);
        osc1.stop(now + 0.32);
        osc2.start(now);
        osc2.stop(now + 0.32);
        // 漩涡噪音
        playNoise(0.2, now + 0.05, 0.06, 6000);
      } else if (name === "boost") {
        // 加速引擎声 - 噪音 + 低频扫频
        playNoise(0.25, now, 0.1, 4000);
        const osc = audioState.ctx.createOscillator();
        const gain = audioState.ctx.createGain();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(60, now);
        osc.frequency.exponentialRampToValueAtTime(240, now + 0.2);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.16, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
        osc.connect(gain);
        gain.connect(audioState.bassGain);
        osc.start(now);
        osc.stop(now + 0.28);
        // 高频加速声
        playTone("sine", 320, 0.15, now + 0.1, 0.08, 280);
      } else if (name === "hit") {
        playTone("triangle", 260, 0.12, now, 0.08, -130);
        playTone("sine", 980, 0.08, now + 0.01, 0.04, -260);
      }
    }

    function setupMenu() {
      modeGrid.innerHTML = "";
      LEVELS.forEach((level) => {
        const record = saveData.records[level.id] || {};
        const bestLine = record.bestTime
          ? `最佳 ${formatTime(record.bestTime)} · 总死亡 ${record.deaths || 0}`
          : `未通关 · 总死亡 ${record.deaths || 0}`;
        const locked = isLevelLocked(level);
        const button = document.createElement("button");
        button.className = `level-button${locked ? " locked" : ""}`;
        button.innerHTML = `
          <strong>${level.name}</strong>
          <span>${level.subtitle} / ${bestLine}</span>
          <span class="status-chip">${locked ? "🔒 Locked" : "已解锁"}</span>
          <span class="lock-badge">🔒</span>
        `;
        if (locked) {
          button.disabled = true;
        } else {
          button.addEventListener("click", () => startRun(level.id));
        }
        modeGrid.appendChild(button);
      });
    }

    function makeCheckpoint(level, time) {
      const count = Math.floor(time / level.checkpointEvery);
      return {
        time: count * level.checkpointEvery,
        distance: Math.max(0, state.distance),
        inverted: player.inverted
      };
    }

    function resetPlayer() {
      player.x = Math.max(112, worldWidth * 0.24);
      player.inverted = false;
      player.y = getTrackSurfaceY(false) - player.size * 0.5;
      player.vy = 0;
      player.jumpsLeft = 2;
      player.grounded = true;
      player.holdTimer = 0;
      player.trail = [];
      player.alive = true;
      player.respawnInvuln = 1;
      player.boostTimer = 0;
      player.radius = player.size * 0.5;
    }

    function placePlayerAtTrack(inverted) {
      player.inverted = inverted;
      player.y = getTrackSurfaceY(player.inverted) + (player.inverted ? player.size * 0.5 : -player.size * 0.5);
    }

    function respawnPlayer(invuln = 2) {
      player.alive = true;
      player.x = Math.max(112, worldWidth * 0.24);
      placePlayerAtTrack(state.currentCheckpoint?.inverted ?? false);
      player.vy = 0;
      player.jumpsLeft = 2;
      player.grounded = true;
      player.holdTimer = 0;
      player.trail = [];
      player.respawnInvuln = invuln;
      player.boostTimer = 0;
    }

    function resetCombo() {
      state.combo = 0;
    }

    function registerCombo(obstacle) {
      if (!obstacle || obstacle.comboAwarded) return;
      obstacle.comboAwarded = true;
      state.combo += obstacle.kind === "portal" || obstacle.kind === "boost" ? 2 : 1;
    }

    function startRun(levelId) {
      state.activeLevel = LEVELS.find((level) => level.id === levelId);
      if (!state.activeLevel || isLevelLocked(state.activeLevel)) {
        return;
      }
      state.mode = "playing";
      state.previousMode = "playing";
      state.startedAt = performance.now();
      state.lastFrame = performance.now();
      state.elapsed = 0;
      state.cameraX = 0;
      state.distance = 0;
      state.levelDeaths = 0;
      state.beatIndex = 0;
      state.beatTimes = [0];
      state.beatPulse = 0;
      state.slowmo = 0;
      state.shake = 0;
      state.portalFlash = 0;
      state.completeAt = 0;
      state.particles = [];
      state.confetti = [];
      state.obstacles = [];
      state.effects = [];
      state.currentCheckpoint = null;
      state.nextCheckpointIndex = 1;
      state.scoreDistance = 0;
      state.score = 0;
      state.combo = 0;
      state.lives = MAX_LIVES;
      state.tutorialMessage = "";
      state.tutorialHitCooldown = 0;
      state.tipTimer = 3;
      state.currentTipIndex = -1;
      resetPlayer();
      menuOverlay.classList.add("hidden");
      resultOverlay.classList.add("hidden");
      settingsOverlay.classList.add("hidden");
      hud.classList.remove("hidden");
      rotateTip(true);
      updateTutorialHint();
      generateBeatsAhead(true);
      startMusic();
      updateHud();
    }

    function returnToMenu() {
      state.mode = "menu";
      state.previousMode = "menu";
      state.activeLevel = null;
      hud.classList.add("hidden");
      resultOverlay.classList.add("hidden");
      settingsOverlay.classList.add("hidden");
      menuOverlay.classList.remove("hidden");
      hintText.textContent = "";
      hintText.classList.add("hidden");
      state.tutorialMessage = "";
      setCenterHint("", false);
      stopMusic();
      setupMenu();
    }

    function updateHud() {
      const level = state.activeLevel;
      if (!level) return;
      const progressRatio = Number.isFinite(level.duration) ? getLevelProgress(level, state.elapsed) : clamp((state.distance % 2000) / 2000, 0, 1);
      const progress = Number.isFinite(level.duration) ? `${Math.floor(progressRatio * 100)}%` : `${Math.floor(state.distance / 10)}m`;
      progressValue.textContent = progress;
      progressBar.style.width = `${progressRatio * 100}%`;
      state.score = getScore();
      timeValue.textContent = state.score.toLocaleString("zh-CN");
      renderLives();
    }

    function beatTimeAt(index) {
      const level = state.activeLevel;
      if (!level) return 0;
      while (state.beatTimes.length <= index) {
        const prev = state.beatTimes[state.beatTimes.length - 1];
        const next = prev + 60 / getCurrentBpm(level, prev);
        state.beatTimes.push(next);
      }
      return state.beatTimes[index];
    }

    function choosePattern(beat) {
      const weights = state.activeLevel.patternWeights;
      return weights[Math.floor(rand(beat * 3.17 + state.activeLevel.bpmStart) * weights.length)];
    }

    function spawnObstacleForBeat(beat) {
      const level = state.activeLevel;
      const spawnAt = beatTimeAt(beat);
      const x = state.distance + state.spawnLead + beat * 22;
      const ceilingY = getTrackSurfaceY(true);
      const floorY = getTrackSurfaceY(false);
      const pulseOffset = rand(beat + 9) * Math.PI * 2;
      const tutorialEvent = level.id === "tutorial" ? TUTORIAL_EVENT_BY_BEAT[beat] : null;
      let type = choosePattern(beat);

      if (tutorialEvent) {
        type = tutorialEvent.type;
      }
      if (level.id === "level1" && (type === "moving" || type === "portal")) type = "spike";
      if (level.id === "level2" && type === "portal") type = "moving";
      if (level.id === "tutorial" && !tutorialEvent) return;
      if (beat < 4 && level.id !== "tutorial") type = "spike";

      if (type === "spike") {
        const cluster = level.id === "tutorial" ? 1 : beat % 6 === 3 ? 2 : 1;
        for (let i = 0; i < cluster; i += 1) {
          state.obstacles.push({
            kind: "spike",
            x: x + i * 44,
            y: floorY,
            width: 32,
            height: 28 + i * 2,
            inverted: false,
            spawnAt,
            pulseOffset,
            tutorialHint: i === 0 ? tutorialEvent?.message : undefined
          });
          if (level.id === "level3" && beat % 7 === 0) {
            state.obstacles.push({
              kind: "spike",
              x: x + i * 44,
              y: ceilingY,
              width: 32,
              height: 28 + i * 2,
              inverted: true,
              spawnAt,
              pulseOffset: pulseOffset + 1
            });
          }
        }
      } else if (type === "block") {
        state.obstacles.push({
          kind: "block",
          x,
          y: level.id === "tutorial" && beat > 10 ? ceilingY + 118 + rand(beat) * 54 : level.id === "tutorial" ? floorY - 118 - rand(beat) * 54 : floorY - 126 - rand(beat) * 90,
          width: 42,
          height: 42,
          spawnAt,
          pulseOffset,
          tutorialHint: tutorialEvent?.message
        });
      } else if (type === "moving") {
        state.obstacles.push({
          kind: "moving",
          x,
          baseY: level.id === "tutorial" && beat > 10 ? ceilingY + 100 + rand(beat) * 120 : floorY - 100 - rand(beat) * 120,
          y: level.id === "tutorial" && beat > 10 ? ceilingY + 120 : floorY - 120,
          width: 88,
          height: 18,
          amp: 35 + rand(beat + 4) * 24,
          speed: 1.4 + rand(beat + 8),
          phase: rand(beat + 12) * Math.PI * 2,
          spawnAt,
          pulseOffset,
          tutorialHint: tutorialEvent?.message
        });
      } else if (type === "portal") {
        state.obstacles.push({
          kind: "portal",
          x,
          y: level.id === "tutorial" && beat > 10 ? ceilingY + 70 : floorY - 70,
          width: 40,
          height: 120,
          spawnAt,
          pulseOffset,
          tutorialHint: tutorialEvent?.message
        });
      } else if (type === "boost") {
        state.obstacles.push({
          kind: "boost",
          x,
          y: level.id === "tutorial" && beat > 10 ? ceilingY + 10 : floorY - 10,
          width: 120,
          height: 12,
          inverted: level.id === "tutorial" && beat > 10,
          spawnAt,
          pulseOffset,
          tutorialHint: tutorialEvent?.message
        });
        if (level.id === "level3" && beat % 5 === 2) {
          state.obstacles.push({
            kind: "portal",
            x: x + 110,
            y: floorY - 70,
            width: 40,
            height: 120,
            spawnAt,
            pulseOffset: pulseOffset + 2
          });
        }
      }
    }

    function generateBeatsAhead(force = false) {
      if (!state.activeLevel) return;
      const level = state.activeLevel;
      const maxAheadTime = state.elapsed + 8;
      while (beatTimeAt(state.beatIndex) < maxAheadTime || force) {
        spawnObstacleForBeat(state.beatIndex);
        state.beatIndex += 1;
        if (!force && beatTimeAt(state.beatIndex) >= maxAheadTime) break;
        if (force && state.beatIndex > 24) break;
      }
    }

    function addParticle(x, y, color, vx, vy, life, size, shape = "square") {
      state.particles.push({
        x,
        y,
        color,
        vx,
        vy,
        life,
        maxLife: life,
        size,
        shape,
        rotation: rand(x + y + life) * Math.PI * 2,
        spin: -8 + rand(x + vx + size) * 16
      });
    }

    function explodePlayer() {
      const px = player.x;
      const py = player.y;
      for (let i = 0; i < 26; i += 1) {
        const angle = (Math.PI * 2 * i) / 26;
        const speed = 90 + rand(i + py) * 260;
        addParticle(
          px,
          py,
          i % 3 === 0 ? "rgba(255,255,255,0.95)" : i % 2 ? "rgba(0,246,255,0.85)" : "rgba(170,235,255,0.78)",
          Math.cos(angle) * speed,
          Math.sin(angle) * speed - 20,
          0.8 + rand(i) * 0.45,
          4 + rand(i + 2) * 7,
          "shard"
        );
      }
    }

    function killPlayer(reason) {
      if (!player.alive) return;
      player.alive = false;
      state.levelDeaths += 1;
      state.deaths += 1;
      state.lives = Math.max(0, state.lives - 1);
      saveData.totalDeaths += 1;
      const record = saveData.records[state.activeLevel.id] || { deaths: 0 };
      record.deaths = (record.deaths || 0) + 1;
      saveData.records[state.activeLevel.id] = record;
      persistSave();
      state.slowmo = 0.55;
      state.shake = 16;
      resetCombo();
      explodePlayer();
      updateHud();
      playSfx("death");
      setTimeout(() => {
        if (state.mode !== "playing") return;
        if (state.lives <= 0) {
          showResult(false, reason);
          return;
        }
        playSfx("hit");
        respawnPlayer(2);
      }, 800);
    }

    function respawnAtCheckpoint() {
      const cp = state.currentCheckpoint;
      if (!cp) {
        showResult(false, "No checkpoint");
        return;
      }
      respawnPlayer(2);
      placePlayerAtTrack(cp.inverted);
      resetCombo();
      state.mode = "playing";
      state.previousMode = "playing";
      state.elapsed = cp.time;
      state.distance = cp.distance;
      state.cameraX = Math.max(0, state.distance - player.x + 100);
      state.slowmo = 0;
      state.obstacles = state.obstacles.filter((o) => o.x > state.distance - 100);
      for (const obstacle of state.obstacles) {
        delete obstacle.usedAt;
      }
      generateBeatsAhead(true);
      resultOverlay.classList.add("hidden");
      hud.classList.remove("hidden");
      startMusic();
      updateHud();
    }

    function showResult(success, detail) {
      state.mode = success ? "complete" : "dead";
      setCenterHint("", false);
      stopMusic();
      hud.classList.add("hidden");
      resultOverlay.classList.remove("hidden");
      if (success) {
        continueButton.classList.add("hidden");
        resultTitle.textContent = "Stage Cleared";
        resultSummary.textContent = `用时 ${formatTime(state.completeAt)}，本局死亡 ${state.levelDeaths} 次。${detail}`;
        playSfx("clear");
        spawnConfetti();
        const record = saveData.records[state.activeLevel.id] || { deaths: 0 };
        if (!record.bestTime || state.completeAt < record.bestTime) {
          record.bestTime = state.completeAt;
        }
        saveData.records[state.activeLevel.id] = record;
        unlockNextLevel(state.activeLevel.id);
        persistSave();
      } else {
        resultTitle.textContent = "Signal Lost";
        if (state.currentCheckpoint) {
          continueButton.classList.remove("hidden");
          resultSummary.textContent = `生命值归零，倒在 ${Math.round(state.distance)}m。原因：${detail}。可从最近检查点恢复进度，但生命值不会回满。`;
        } else {
          continueButton.classList.add("hidden");
          resultSummary.textContent = `生命值归零，倒在 ${Math.round(state.distance)}m。原因：${detail}。当前还没有检查点，只能重开或回到主菜单。`;
        }
      }
      setupMenu();
    }

    function updateEffects(dt) {
      const activeEffects = [];
      for (const effect of state.effects) {
        effect.life -= dt;
        if (effect.life > 0) {
          activeEffects.push(effect);
          continue;
        }
        if (effect.kind === "centerHint" && state.tutorialMessage === effect.message) {
          state.tutorialMessage = "";
          setCenterHint("", false);
        } else if (effect.kind === "tutorialHintReset") {
          updateTutorialHint();
        }
      }
      state.effects = activeEffects;
    }

    function spawnConfetti() {
      state.confetti = [];
      for (let i = 0; i < 90; i += 1) {
        state.confetti.push({
          x: rand(i) * worldWidth,
          y: -rand(i + 1) * 180,
          vx: -80 + rand(i + 2) * 160,
          vy: 80 + rand(i + 3) * 180,
          rot: rand(i + 4) * Math.PI * 2,
          vr: -6 + rand(i + 5) * 12,
          color: ["#00f6ff", "#ff3fb4", "#bbff00", "#ffb000"][i % 4],
          size: 4 + rand(i + 7) * 8
        });
      }
    }

    function handlePressStart() {
      state.inputDown = true;
      state.pressStart = performance.now();
      unlockAudio();
      if (state.mode === "menu") return;
      if (state.mode === "dead" || state.mode === "complete") return;
      if (state.mode !== "playing" || !player.alive) return;
      attemptJump();
    }

    function handlePressEnd() {
      state.inputDown = false;
      player.holdTimer = 0;
    }

    function attemptJump() {
      if (!player.alive || player.jumpsLeft <= 0) return;
      const upward = player.inverted ? 1 : -1;
      player.vy = upward * 640;
      player.jumpsLeft -= 1;
      player.grounded = false;
      player.holdTimer = 0.22;
      state.shake = Math.max(state.shake, 4);
      playSfx("jump");
    }

    function isPlayerRect() {
      return {
        left: player.x - player.size / 2,
        right: player.x + player.size / 2,
        top: player.y - player.size / 2,
        bottom: player.y + player.size / 2
      };
    }

    function rectsOverlap(a, b) {
      return a.left < b.right && a.right > b.left && a.top < b.bottom && a.bottom > b.top;
    }

    function updatePlayer(dt) {
      if (!player.alive) return;
      const level = state.activeLevel;
      if (!level) return;

      player.boostTimer = Math.max(0, player.boostTimer - dt);
      player.respawnInvuln = Math.max(0, player.respawnInvuln - dt);
      const gravityDir = player.inverted ? -1 : 1;
      const holdBoost = state.inputDown && player.holdTimer > 0 ? -gravityDir * 1250 : 0;
      player.holdTimer = Math.max(0, player.holdTimer - dt);
      player.vy += (player.gravity * gravityDir + holdBoost) * dt;
      player.y += player.vy * dt;
      player.grounded = false;

      const trackY = getTrackSurfaceY(player.inverted);
      if (!player.inverted) {
        const groundTop = trackY;
        if (player.y + player.size / 2 >= groundTop) {
          player.y = groundTop - player.size / 2;
          player.vy = 0;
          player.grounded = true;
          player.jumpsLeft = 2;
        }
      } else {
        const ceilingBottom = trackY;
        if (player.y - player.size / 2 <= ceilingBottom) {
          player.y = ceilingBottom + player.size / 2;
          player.vy = 0;
          player.grounded = true;
          player.jumpsLeft = 2;
        }
      }

      const pr = isPlayerRect();
      for (const obstacle of state.obstacles) {
        if (obstacle.kind === "moving") {
          obstacle.y = obstacle.baseY + Math.sin(state.elapsed * obstacle.speed + obstacle.phase) * obstacle.amp;
          const plat = {
            left: obstacle.x - obstacle.width / 2 - state.cameraX,
            right: obstacle.x + obstacle.width / 2 - state.cameraX,
            top: obstacle.y - obstacle.height / 2,
            bottom: obstacle.y + obstacle.height / 2
          };
          const feet = player.inverted ? pr.top : pr.bottom;
          const surface = player.inverted ? plat.bottom : plat.top;
          const horiz = pr.right > plat.left + 6 && pr.left < plat.right - 6;
          const touching = Math.abs(feet - surface) < 18;
          const movingToward = player.inverted ? player.vy < 120 : player.vy > -120;
          if (horiz && touching && movingToward) {
            if (!player.inverted && pr.bottom <= plat.top + 16) {
              player.y = plat.top - player.size / 2;
              player.vy = 0;
              player.grounded = true;
              player.jumpsLeft = 2;
            } else if (player.inverted && pr.top >= plat.bottom - 16) {
              player.y = plat.bottom + player.size / 2;
              player.vy = 0;
              player.grounded = true;
              player.jumpsLeft = 2;
            }
          }
        }
      }

      player.trail.push({ x: player.x, y: player.y, life: 0.32 });
      if (player.trail.length > 20) player.trail.shift();
      for (const ghost of player.trail) ghost.life -= dt;
      player.trail = player.trail.filter((ghost) => ghost.life > 0);

      for (let i = 0; i < 2; i += 1) {
        addParticle(
          player.x - 8 - rand(state.elapsed * 100 + i) * 6,
          player.y + (player.inverted ? 14 : -14),
          player.inverted ? "rgba(187,255,0,0.55)" : "rgba(0,246,255,0.55)",
          -40 - rand(i + state.elapsed) * 60,
          (player.inverted ? 1 : -1) * (40 + rand(i) * 30),
          0.22,
          2 + rand(i + 5) * 2,
          "orb"
        );
      }
    }

    function updateObstacles(dt) {
      const pr = isPlayerRect();
      const level = state.activeLevel;
      if (!level) return;
      const playerWorldX = getPlayerWorldX();
      const tutorialNoPenalty = level.id === "tutorial";

      for (const obstacle of state.obstacles) {
        if (obstacle.tutorialHint && !obstacle.tutorialHintShown && obstacle.x - playerWorldX < 240) {
          obstacle.tutorialHintShown = true;
          showCenterHintMessage(obstacle.tutorialHint, 2.4);
        }
        const obstacleRight = obstacle.x + obstacle.width / 2;
        if (player.alive && obstacleRight < playerWorldX - 24) {
          registerCombo(obstacle);
        }
        if (obstacle.kind === "portal" || obstacle.kind === "boost") {
          const rect = {
            left: obstacle.x - obstacle.width / 2 - state.cameraX,
            right: obstacle.x + obstacle.width / 2 - state.cameraX,
            top: obstacle.y - obstacle.height / 2,
            bottom: obstacle.y + obstacle.height / 2
          };
          if (rectsOverlap(pr, rect) && player.respawnInvuln <= 0) {
            if (obstacle.kind === "portal" && !obstacle.usedAt) {
              obstacle.usedAt = state.elapsed;
              player.inverted = !player.inverted;
              player.vy *= 0.6;
              player.y = clamp(player.y, 60, worldHeight - 60);
              state.portalFlash = 0.4;
              state.shake = Math.max(state.shake, 10);
              playSfx("portal");
            }
            if (obstacle.kind === "boost" && !obstacle.usedAt) {
              obstacle.usedAt = state.elapsed;
              player.boostTimer = 1.5;
              state.shake = Math.max(state.shake, 8);
              playSfx("boost");
            }
          }
          continue;
        }

        let rect;
        if (obstacle.kind === "spike") {
          rect = {
            left: obstacle.x - obstacle.width / 2 - state.cameraX + 4,
            right: obstacle.x + obstacle.width / 2 - state.cameraX - 4,
            top: obstacle.inverted ? obstacle.y : obstacle.y - obstacle.height,
            bottom: obstacle.inverted ? obstacle.y + obstacle.height : obstacle.y
          };
        } else {
          rect = {
            left: obstacle.x - obstacle.width / 2 - state.cameraX,
            right: obstacle.x + obstacle.width / 2 - state.cameraX,
            top: obstacle.y - obstacle.height / 2,
            bottom: obstacle.y + obstacle.height / 2
          };
        }

        if (rectsOverlap(pr, rect) && player.respawnInvuln <= 0) {
          if (tutorialNoPenalty) {
            if (state.tutorialHitCooldown <= 0) {
              state.tutorialHitCooldown = 1.1;
              let tutorialCrashMessage = "碰到尖刺了，别急，继续练";
              if (obstacle.kind === "block") tutorialCrashMessage = "碰到悬浮块了，调整起跳时机";
              if (obstacle.kind === "moving") tutorialCrashMessage = "移动平台没踩稳，再跟一拍试试";
              flashTutorialCollision(tutorialCrashMessage);
              state.shake = Math.max(state.shake, 5);
              playSfx("hit");
            }
            continue;
          }
          killPlayer(obstacle.kind === "moving" ? "撞上移动平台边缘" : obstacle.kind === "block" ? "撞上悬浮块" : "尖刺命中");
          break;
        }
      }

      state.obstacles = state.obstacles.filter((obstacle) => obstacle.x - state.cameraX > -180);
      generateBeatsAhead(false);

      const checkpointCount = Math.floor(state.elapsed / level.checkpointEvery);
      if (checkpointCount >= state.nextCheckpointIndex && player.alive) {
        state.currentCheckpoint = makeCheckpoint(level, state.elapsed);
        state.nextCheckpointIndex = checkpointCount + 1;
        playSfx("checkpoint");
        for (let i = 0; i < 16; i += 1) {
          addParticle(player.x, player.y, "#bbff00", -60 + rand(i) * 120, -120 + rand(i + 3) * 240, 0.45, 2 + rand(i + 1) * 3);
        }
      }
    }

    function updateParticles(dt) {
      for (const p of state.particles) {
        p.life -= dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 220 * dt;
        p.rotation += p.spin * dt;
      }
      state.particles = state.particles.filter((p) => p.life > 0);
    }

    function updateConfetti(dt) {
      for (const c of state.confetti) {
        c.x += c.vx * dt;
        c.y += c.vy * dt;
        c.rot += c.vr * dt;
        c.vy += 180 * dt;
      }
      state.confetti = state.confetti.filter((c) => c.y < worldHeight + 40);
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, worldHeight);
      g.addColorStop(0, "#060913");
      g.addColorStop(0.55, "#05060a");
      g.addColorStop(1, "#090b14");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, worldWidth, worldHeight);

      for (const star of state.stars) {
        const x = (star.x - state.cameraX * 0.12 * (star.speed / 20)) % (worldWidth + 80);
        ctx.fillStyle = `rgba(0,246,255,${0.12 + star.r * 0.08})`;
        ctx.beginPath();
        ctx.arc((x + worldWidth + 80) % (worldWidth + 80), star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }

      const beatGlow = 0.08 + state.beatPulse * 0.18;
      ctx.fillStyle = `rgba(0, 246, 255, ${beatGlow})`;
      ctx.fillRect(0, getTrackSurfaceY(false), worldWidth, 4);
      ctx.fillStyle = `rgba(255, 63, 180, ${beatGlow * 0.85})`;
      ctx.fillRect(0, getTrackSurfaceY(true) - 4, worldWidth, 4);

      for (let i = -1; i < 12; i += 1) {
        const x = ((i * 120 - (state.cameraX * 0.45) % 120) + worldWidth) % (worldWidth + 120) - 60;
        ctx.strokeStyle = "rgba(255,255,255,0.04)";
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x - 80, worldHeight);
        ctx.stroke();
      }
    }

    function drawObstacle(obstacle) {
      const x = obstacle.x - state.cameraX;
      const pulse = 0.55 + 0.45 * Math.sin(state.elapsed * 8 + obstacle.pulseOffset + state.beatPulse * Math.PI);
      ctx.save();
      if (obstacle.kind === "spike") {
        ctx.shadowBlur = 18 + pulse * 12;
        ctx.shadowColor = obstacle.inverted ? "#ff3fb4" : "#00f6ff";
        ctx.fillStyle = obstacle.inverted ? `rgba(255, 63, 180, ${0.85 + pulse * 0.15})` : `rgba(0, 246, 255, ${0.85 + pulse * 0.15})`;
        ctx.beginPath();
        if (obstacle.inverted) {
          ctx.moveTo(x - obstacle.width / 2, obstacle.y);
          ctx.lineTo(x, obstacle.y + obstacle.height);
          ctx.lineTo(x + obstacle.width / 2, obstacle.y);
        } else {
          ctx.moveTo(x - obstacle.width / 2, obstacle.y);
          ctx.lineTo(x, obstacle.y - obstacle.height);
          ctx.lineTo(x + obstacle.width / 2, obstacle.y);
        }
        ctx.closePath();
        ctx.fill();
      } else if (obstacle.kind === "block") {
        ctx.shadowBlur = 20 + pulse * 16;
        ctx.shadowColor = "#ff3fb4";
        ctx.fillStyle = `rgba(255, 63, 180, ${0.7 + pulse * 0.2})`;
        ctx.fillRect(x - obstacle.width / 2, obstacle.y - obstacle.height / 2, obstacle.width, obstacle.height);
      } else if (obstacle.kind === "moving") {
        ctx.shadowBlur = 24 + pulse * 10;
        ctx.shadowColor = "#bbff00";
        ctx.fillStyle = `rgba(187, 255, 0, ${0.68 + pulse * 0.2})`;
        ctx.fillRect(x - obstacle.width / 2, obstacle.y - obstacle.height / 2, obstacle.width, obstacle.height);
      } else if (obstacle.kind === "portal") {
        ctx.strokeStyle = `rgba(255, 176, 0, ${0.7 + pulse * 0.2})`;
        ctx.lineWidth = 4;
        ctx.shadowBlur = 28;
        ctx.shadowColor = "#ffb000";
        ctx.strokeRect(x - obstacle.width / 2, obstacle.y - obstacle.height / 2, obstacle.width, obstacle.height);
        ctx.strokeStyle = `rgba(255,255,255,${0.2 + pulse * 0.2})`;
        ctx.strokeRect(x - obstacle.width / 4, obstacle.y - obstacle.height / 2, obstacle.width / 2, obstacle.height);
      } else if (obstacle.kind === "boost") {
        ctx.shadowBlur = 22 + pulse * 10;
        ctx.shadowColor = "#00f6ff";
        ctx.fillStyle = `rgba(0, 246, 255, ${0.3 + pulse * 0.25})`;
        ctx.fillRect(x - obstacle.width / 2, obstacle.y - obstacle.height / 2, obstacle.width, obstacle.height);
        ctx.strokeStyle = "rgba(255,255,255,0.65)";
        ctx.lineWidth = 2;
        for (let i = -1; i <= 1; i += 1) {
          ctx.beginPath();
          ctx.moveTo(x - 18 + i * 26, obstacle.y - 3);
          ctx.lineTo(x + i * 26, obstacle.y);
          ctx.lineTo(x - 18 + i * 26, obstacle.y + 3);
          ctx.stroke();
        }
      }
      ctx.restore();
    }

    function drawPlayer() {
      ctx.save();
      for (const ghost of player.trail) {
        const alpha = ghost.life / 0.32;
        const ghostRadius = player.radius * (0.7 + alpha * 0.3);
        const ghostGlow = ctx.createRadialGradient(ghost.x - ghostRadius * 0.25, ghost.y - ghostRadius * 0.35, 2, ghost.x, ghost.y, ghostRadius * 1.2);
        ghostGlow.addColorStop(0, `rgba(255,255,255,${alpha * 0.18})`);
        ghostGlow.addColorStop(0.35, player.inverted ? `rgba(187,255,0,${alpha * 0.16})` : `rgba(0,246,255,${alpha * 0.18})`);
        ghostGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = ghostGlow;
        ctx.beginPath();
        ctx.arc(ghost.x, ghost.y, ghostRadius, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.translate(player.x, player.y);
      const blink = player.respawnInvuln > 0 && Math.floor(state.elapsed * 12) % 2 === 0;
      const shellGlow = player.inverted ? "rgba(187,255,0,0.95)" : "rgba(0,246,255,0.92)";
      const outer = ctx.createRadialGradient(-player.radius * 0.35, -player.radius * 0.45, 2, 0, 0, player.radius * 1.3);
      outer.addColorStop(0, blink ? "rgba(255,255,255,0.96)" : "rgba(255,255,255,0.82)");
      outer.addColorStop(0.25, blink ? "rgba(255,255,255,0.88)" : "rgba(170,245,255,0.72)");
      outer.addColorStop(0.62, player.inverted ? "rgba(187,255,0,0.42)" : "rgba(0,246,255,0.38)");
      outer.addColorStop(1, "rgba(5, 10, 18, 0.08)");
      ctx.shadowBlur = 36;
      ctx.shadowColor = shellGlow;
      ctx.fillStyle = outer;
      ctx.beginPath();
      ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255,255,255,0.36)";
      ctx.beginPath();
      ctx.arc(0, 0, player.radius - 1, Math.PI * 0.18, Math.PI * 1.92);
      ctx.stroke();

      const inner = ctx.createRadialGradient(-player.radius * 0.18, -player.radius * 0.22, 1, 0, 0, player.radius);
      inner.addColorStop(0, "rgba(255,255,255,0.34)");
      inner.addColorStop(0.45, "rgba(255,255,255,0.1)");
      inner.addColorStop(1, "rgba(4,10,18,0.12)");
      ctx.fillStyle = inner;
      ctx.beginPath();
      ctx.arc(0, 0, player.radius * 0.8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.36)";
      ctx.beginPath();
      ctx.ellipse(-player.radius * 0.34, -player.radius * 0.4, player.radius * 0.34, player.radius * 0.2, -0.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.beginPath();
      ctx.ellipse(player.radius * 0.24, player.radius * 0.3, player.radius * 0.18, player.radius * 0.1, 0.6, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawParticles() {
      for (const p of state.particles) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        if (p.shape === "orb") {
          ctx.beginPath();
          ctx.arc(0, 0, p.size * 0.5, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.shape === "shard") {
          ctx.beginPath();
          ctx.moveTo(-p.size * 0.45, -p.size * 0.2);
          ctx.lineTo(p.size * 0.4, -p.size * 0.48);
          ctx.lineTo(p.size * 0.52, p.size * 0.06);
          ctx.lineTo(-p.size * 0.12, p.size * 0.48);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = "rgba(255,255,255,0.34)";
          ctx.lineWidth = 1;
          ctx.stroke();
        } else {
          ctx.fillRect(-p.size * 0.5, -p.size * 0.5, p.size, p.size);
        }
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }

    function drawConfetti() {
      for (const c of state.confetti) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.fillStyle = c.color;
        ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size * 0.6);
        ctx.restore();
      }
    }

    function drawCheckpointMarker() {
      if (!state.currentCheckpoint) return;
      const x = player.x + 72;
      ctx.save();
      ctx.strokeStyle = "rgba(187,255,0,0.75)";
      ctx.shadowBlur = 18;
      ctx.shadowColor = "#bbff00";
      ctx.beginPath();
      ctx.moveTo(x, getTrackSurfaceY(false) - 80);
      ctx.lineTo(x, getTrackSurfaceY(false) - 18);
      ctx.stroke();
      ctx.fillStyle = "#bbff00";
      ctx.beginPath();
      ctx.moveTo(x, getTrackSurfaceY(false) - 82);
      ctx.lineTo(x + 26, getTrackSurfaceY(false) - 70);
      ctx.lineTo(x, getTrackSurfaceY(false) - 58);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function render() {
      ctx.save();
      const shakeX = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
      const shakeY = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
      ctx.translate(shakeX, shakeY);
      drawBackground();
      drawCheckpointMarker();
      for (const obstacle of state.obstacles) {
        if (obstacle.x - state.cameraX > -100 && obstacle.x - state.cameraX < worldWidth + 160) {
          drawObstacle(obstacle);
        }
      }
      drawParticles();
      if (player.alive) drawPlayer();
      drawConfetti();
      if (state.portalFlash > 0) {
        ctx.fillStyle = `rgba(255,176,0,${state.portalFlash * 0.18})`;
        ctx.fillRect(0, 0, worldWidth, worldHeight);
      }
      ctx.restore();
    }

    function update(now) {
      const rawDt = Math.min((now - state.lastFrame) / 1000, 0.033);
      state.lastFrame = now;
      const dt = rawDt * (state.slowmo > 0 ? 0.35 : 1);

      if (state.mode === "playing") {
        state.elapsed += dt;
        state.tutorialHitCooldown = Math.max(0, state.tutorialHitCooldown - dt);
        state.tipTimer += dt;
        rotateTip();
        const speed = getCurrentSpeed(state.activeLevel, state.elapsed);
        state.distance += speed * dt;
        state.cameraX = Math.max(0, state.distance - player.x + 140);
        state.beatPulse = Math.max(0, state.beatPulse - dt * 3.4);
        state.portalFlash = Math.max(0, state.portalFlash - dt);
        state.slowmo = Math.max(0, state.slowmo - rawDt);
        state.shake = Math.max(0, state.shake - rawDt * 22);

        const bpm = getCurrentBpm(state.activeLevel, state.elapsed);
        const beatSec = 60 / bpm;
        const liveBeat = Math.floor(state.elapsed / beatSec);
        if (liveBeat !== state.scoreDistance) {
          state.scoreDistance = liveBeat;
          state.beatPulse = 1;
        }

        updatePlayer(dt);
        updateObstacles(dt);
        updateParticles(dt);
        updateEffects(dt);
        updateTutorialHint();

        if (Number.isFinite(state.activeLevel.duration) && state.elapsed >= state.activeLevel.duration && player.alive) {
          state.completeAt = state.elapsed;
          showResult(true, "节奏链路已稳定通关");
        }

        if (state.activeLevel.id === "endless" && player.alive) {
          state.completeAt = state.elapsed;
        }

        updateHud();
      } else {
        state.shake = Math.max(0, state.shake - rawDt * 14);
        state.portalFlash = Math.max(0, state.portalFlash - rawDt);
        updateParticles(rawDt);
        updateConfetti(rawDt);
        updateEffects(rawDt);
      }

      render();
      requestAnimationFrame(update);
    }

    function bindInput() {
      const start = (event) => {
        if (event.target.closest("button, input, label, .panel")) return;
        event.preventDefault();
        handlePressStart();
      };
      const end = (event) => {
        if (event.target.closest("button, input, label, .panel")) return;
        event.preventDefault();
        handlePressEnd();
      };
      window.addEventListener("pointerdown", start, { passive: false });
      window.addEventListener("pointerup", end, { passive: false });
      window.addEventListener("pointercancel", end, { passive: false });
      window.addEventListener("pointerleave", end, { passive: false });
      window.addEventListener("keydown", (event) => {
        if (event.code === "Space" || event.code === "ArrowUp") {
          event.preventDefault();
          handlePressStart();
        }
      });
      window.addEventListener("keyup", (event) => {
        if (event.code === "Space" || event.code === "ArrowUp") {
          event.preventDefault();
          handlePressEnd();
        }
      });
      window.addEventListener("contextmenu", (event) => {
        event.preventDefault();
      });
      window.addEventListener("selectstart", (event) => {
        event.preventDefault();
      });
    }

    continueButton.addEventListener("click", () => {
      if (state.currentCheckpoint) {
        respawnAtCheckpoint();
      }
    });

    retryButton.addEventListener("click", () => {
      if (!state.activeLevel) {
        returnToMenu();
        return;
      }
      startRun(state.activeLevel.id);
    });

    menuButton.addEventListener("click", () => {
      returnToMenu();
    });

    settingsButton.addEventListener("click", () => {
      state.previousMode = state.mode;
      settingsOverlay.classList.remove("hidden");
    });

    closeSettingsButton.addEventListener("click", () => {
      settingsOverlay.classList.add("hidden");
    });

    function toggleMute() {
      saveData.settings.muted = !saveData.settings.muted;
      applyAudioSettings();
      persistSave();
    }

    soundToggle.addEventListener("click", toggleMute);
    menuSoundToggle.addEventListener("click", toggleMute);

    volumeSlider.addEventListener("input", () => {
      saveData.settings.volume = clamp(Number(volumeSlider.value) / 100, 0, 1);
      if (saveData.settings.volume > 0 && saveData.settings.muted) {
        saveData.settings.muted = false;
      }
      applyAudioSettings();
      persistSave();
    });

    rankingToggle.addEventListener("change", () => {
      saveData.settings.participateRanking = rankingToggle.checked;
      applyPrivacySettings();
      persistSave();
    });

    privacyButton.addEventListener("click", () => {
      window.alert("隐私条款：本页面仅在本机 localStorage 保存成绩、音量、静音状态和是否参与排名的偏好；不开启参与排名时，不会把该偏好用于公开展示。");
    });

    window.addEventListener("resize", resize);

    initializeUnlocks();
    applyAudioSettings();
    applyPrivacySettings();
    renderLives();
    setupMenu();
    bindInput();
    resize();
    requestAnimationFrame((time) => {
      state.lastFrame = time;
      requestAnimationFrame(update);
    });
  </script>
</body>
</html>
