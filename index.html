<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Pulse Rush</title>
  <style>
    :root {
      --bg: #05060a;
      --panel: rgba(7, 10, 18, 0.82);
      --cyan: #00f6ff;
      --pink: #ff3fb4;
      --lime: #bbff00;
      --amber: #ffb000;
      --red: #ff4b6e;
      --text: #ecf5ff;
      --muted: #7a8da6;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    html,
    body,
    canvas,
    img {
      -webkit-touch-callout: none;
    }

    canvas,
    img {
      -webkit-user-drag: none;
      user-drag: none;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(0, 246, 255, 0.08), transparent 25%),
        radial-gradient(circle at bottom, rgba(255, 63, 180, 0.1), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Helvetica Neue", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      min-height: 100dvh;
      isolation: isolate;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -12vmax;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 16%, rgba(0, 246, 255, 0.2), transparent 24%),
        radial-gradient(circle at 18% 82%, rgba(255, 63, 180, 0.14), transparent 30%),
        radial-gradient(circle at 82% 78%, rgba(187, 255, 0, 0.1), transparent 24%);
      filter: blur(18px);
      transform: translateZ(0);
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud,
    .overlay,
    .hint {
      position: fixed;
      left: 0;
      right: 0;
      z-index: 2;
      pointer-events: none;
    }

    .hud {
      top: 0;
      padding: calc(env(safe-area-inset-top, 0px) + 12px) 16px 12px;
      min-height: 180px;
    }

    .hud-corner {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      pointer-events: auto;
    }

    .hud-corner.left {
      left: 16px;
    }

    .hud-corner.right {
      right: 16px;
    }

    .hud-center {
      width: min(100%, 420px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .chip {
      min-width: 0;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 24px rgba(0, 246, 255, 0.08);
    }

    .label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .value {
      display: block;
      font-weight: 700;
      font-size: 18px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .timer-chip {
      min-width: 210px;
      padding: 0;
      text-align: center;
      border: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
    }

    .timer-chip .label {
      margin-bottom: 10px;
      font-size: 13px;
      letter-spacing: 0.28em;
      color: rgba(236, 245, 255, 0.72);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.2);
    }

    .timer-chip .value {
      font-size: clamp(48px, 9vw, 88px);
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #8ffcff;
      text-shadow:
        0 0 12px rgba(143, 252, 255, 0.95),
        0 0 28px rgba(0, 246, 255, 0.72),
        0 0 58px rgba(255, 63, 180, 0.34);
    }

    .progress-wrap {
      width: 100%;
      padding: 10px 12px 12px;
      background: rgba(7, 10, 18, 0.46);
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 12px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(236, 245, 255, 0.74);
    }

    .progress-track {
      position: relative;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background:
        linear-gradient(90deg, rgba(0, 246, 255, 0.86), rgba(255, 63, 180, 0.78)),
        linear-gradient(180deg, rgba(255,255,255,0.26), rgba(255,255,255,0));
      box-shadow:
        0 0 24px rgba(0, 246, 255, 0.3),
        inset 0 0 10px rgba(255,255,255,0.18);
      transition: width 0.12s linear;
    }

    .hearts {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 6px;
      min-height: 20px;
      font-size: 14px;
      text-shadow: 0 0 8px rgba(255, 75, 110, 0.34);
    }

    .heart {
      opacity: 0.28;
      transition: opacity 0.16s ease, transform 0.16s ease;
    }

    .heart.active {
      opacity: 1;
      transform: translateY(-1px);
    }

    .icon-button {
      width: 58px;
      height: 58px;
      min-width: 58px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 22px;
      line-height: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.16), transparent 38%),
        linear-gradient(135deg, rgba(0, 246, 255, 0.16), rgba(255, 63, 180, 0.22)),
        rgba(7, 10, 18, 0.78);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.14),
        0 0 22px rgba(0, 246, 255, 0.26),
        0 0 38px rgba(255, 63, 180, 0.12);
    }

    .icon-button span {
      color: var(--text);
      font-size: 24px;
      filter: drop-shadow(0 0 10px rgba(0, 246, 255, 0.46));
    }

    .overlay {
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      min-height: 100dvh;
    }

    .panel {
      width: min(100%, 460px);
      pointer-events: auto;
      padding: 22px 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
        rgba(5, 8, 16, 0.9);
      box-shadow:
        0 18px 80px rgba(0, 0, 0, 0.45),
        0 0 40px rgba(0, 246, 255, 0.08);
    }

    .menu-overlay {
      align-items: stretch;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 22px)
        20px
        calc(env(safe-area-inset-bottom, 0px) + 24px);
    }

    .menu-screen {
      position: relative;
      width: min(100%, 980px);
      min-height: calc(100dvh - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px) - 46px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(22px, 4vh, 42px);
    }

    .menu-topbar,
    .menu-bottom {
      position: absolute;
      left: 0;
      right: 0;
      display: flex;
      pointer-events: none;
    }

    .menu-topbar {
      top: 0;
      justify-content: flex-end;
    }

    .menu-bottom {
      bottom: 0;
      justify-content: center;
    }

    .menu-topbar .icon-button,
    .menu-bottom .icon-button {
      pointer-events: auto;
    }

    .menu-title {
      text-align: center;
      pointer-events: none;
    }

    .menu-panel {
      margin-top: clamp(18px, 7vh, 64px);
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 36px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--cyan);
      text-shadow: 0 0 18px rgba(0, 246, 255, 0.55);
    }

    h2 {
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
      text-align: center;
    }

    .mode-grid {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(0, 246, 255, 0.18), rgba(255, 63, 180, 0.18));
      color: var(--text);
      text-align: left;
      font: inherit;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    button strong {
      display: block;
      font-size: 17px;
      margin-bottom: 4px;
    }

    button span {
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .settings-panel {
      width: min(100%, 420px);
    }

    .settings-group {
      margin-top: 18px;
      display: grid;
      gap: 14px;
    }

    .settings-item {
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 0 0 1px rgba(0, 246, 255, 0.04);
    }

    .settings-item .title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .settings-item .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .slider-row,
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .slider-row output {
      min-width: 48px;
      text-align: right;
      color: var(--cyan);
      font-weight: 700;
    }

    input[type="range"] {
      flex: 1;
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), #7cfbff);
      box-shadow: 0 0 16px rgba(0, 246, 255, 0.46);
      border: 0;
    }

    .switch {
      position: relative;
      width: 58px;
      height: 32px;
      flex: 0 0 auto;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .switch-slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
      transition: 0.2s ease;
    }

    .switch-slider::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      left: 4px;
      top: 4px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f8fbff, #95fbff);
      box-shadow: 0 0 14px rgba(0, 246, 255, 0.28);
      transition: transform 0.2s ease;
    }

    .switch input:checked + .switch-slider {
      background: rgba(0, 246, 255, 0.26);
    }

    .switch input:checked + .switch-slider::before {
      transform: translateX(26px);
    }

    .settings-actions {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .hint {
      bottom: 0;
      padding: 12px 18px calc(env(safe-area-inset-bottom, 0px) + 12px);
      text-align: center;
      color: rgba(236, 245, 255, 0.75);
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow:
        0 0 10px rgba(0, 246, 255, 0.2),
        0 0 18px rgba(255, 63, 180, 0.12);
    }

    .center-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      z-index: 3;
      width: min(82vw, 520px);
      padding: 18px 24px;
      border: 1px solid rgba(0, 246, 255, 0.28);
      border-radius: 22px;
      background: rgba(4, 10, 20, 0.44);
      backdrop-filter: blur(10px);
      color: var(--cyan);
      text-align: center;
      font-size: clamp(22px, 4vw, 34px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-shadow:
        0 0 16px rgba(0, 246, 255, 0.7),
        0 0 30px rgba(0, 246, 255, 0.3);
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .center-hint.visible {
      opacity: 1;
    }

    .hidden {
      display: none;
    }

    .menu-title-text {
      font-size: clamp(52px, 12vw, 110px);
      line-height: 0.92;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(120deg, #7cfbff 0%, #00f6ff 24%, #ff3fb4 52%, #bbff00 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 0 18px rgba(0, 246, 255, 0.52),
        0 0 34px rgba(255, 63, 180, 0.34);
      animation: neonTitleShift 6s linear infinite, neonTitlePulse 1.8s ease-in-out infinite alternate;
    }

    .menu-title .sub {
      max-width: min(80vw, 620px);
      margin-top: 16px;
      font-size: clamp(14px, 2.2vw, 16px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(236, 245, 255, 0.76);
    }

    .icon-button.settings-fab {
      width: 72px;
      height: 72px;
      min-width: 72px;
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.16),
        0 0 28px rgba(0, 246, 255, 0.3),
        0 0 56px rgba(255, 63, 180, 0.16);
    }

    .icon-button.settings-fab span {
      font-size: 30px;
    }

    @keyframes neonTitleShift {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100% 50%;
      }
    }

    @keyframes neonTitlePulse {
      0% {
        transform: translateY(0) scale(1);
        filter: drop-shadow(0 0 8px rgba(0, 246, 255, 0.35));
      }
      100% {
        transform: translateY(-4px) scale(1.02);
        filter: drop-shadow(0 0 16px rgba(255, 63, 180, 0.34));
      }
    }

    .accent {
      color: var(--pink);
    }

    .level-button {
      position: relative;
      overflow: hidden;
    }

    .level-button::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(1, 4, 10, 0.14);
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }

    .level-button.locked {
      cursor: not-allowed;
    }

    .level-button.locked::after {
      opacity: 1;
      background: rgba(1, 4, 10, 0.58);
    }

    .level-button.locked strong,
    .level-button.locked span {
      opacity: 0.62;
    }

    .lock-badge {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 0 18px rgba(255, 255, 255, 0.3);
      pointer-events: none;
      opacity: 0;
    }

    .level-button.locked .lock-badge {
      opacity: 1;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      color: rgba(236, 245, 255, 0.8);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div class="hud hidden" id="hud">
    <div class="hud-corner left">
      <div class="hearts" id="livesValue" aria-label="生命值"></div>
    </div>
    <div class="hud-center">
      <div class="chip timer-chip">
        <span class="label">分数</span>
        <span class="value" id="timeValue">0</span>
      </div>
      <div class="chip progress-wrap">
        <div class="progress-meta">
          <span>关卡进度</span>
          <span id="progressValue">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>
    <div class="hud-corner right">
      <button id="soundToggle" class="icon-button" type="button" aria-label="切换声音">
        <span id="soundToggleIcon">🔊</span>
      </button>
    </div>
  </div>

  <div class="overlay menu-overlay" id="menuOverlay">
    <div class="menu-screen">
      <div class="menu-topbar">
        <button id="menuSoundToggle" class="icon-button" type="button" aria-label="切换声音">
          <span id="menuSoundToggleIcon">🔊</span>
        </button>
      </div>
      <div class="menu-title">
        <div class="menu-title-text">Pulse Rush</div>
        <p class="sub">霓虹节奏跑酷。全屏点击跳跃，长按抬高弹道，空中可二段跳。传送门会翻转重力，加速带会把你直接推进高压区。</p>
      </div>
      <div class="panel menu-panel">
        <div class="mode-grid" id="modeGrid"></div>
      </div>
      <div class="menu-bottom">
        <button id="settingsButton" class="icon-button settings-fab" type="button" aria-label="打开设置">
          <span>⚙️</span>
        </button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="settingsOverlay">
    <div class="panel settings-panel">
      <h2>设置</h2>
      <p class="sub">调一下音量和隐私偏好，霓虹赛道照样继续卷。</p>
      <div class="settings-group">
        <div class="settings-item">
          <div class="title">音量调节</div>
          <div class="meta">控制背景音乐和音效总音量，范围 0-100%。</div>
          <div class="slider-row">
            <input id="volumeSlider" type="range" min="0" max="100" step="1" value="100" />
            <output id="volumeValue">100%</output>
          </div>
        </div>
        <div class="settings-item">
          <div class="title">隐私设置</div>
          <div class="meta">开启后表示愿意参与排名展示，仅保存偏好，不影响本地成绩。</div>
          <div class="toggle-row">
            <label class="switch" aria-label="参与排名">
              <input id="rankingToggle" type="checkbox" checked />
              <span class="switch-slider"></span>
            </label>
            <span id="rankingStatus">参与排名</span>
          </div>
        </div>
        <div class="settings-item">
          <div class="title">隐私条款</div>
          <div class="meta">查看当前页面的本地隐私说明。</div>
          <button id="privacyButton" type="button">
            <strong>查看隐私条款</strong>
            <span>说明音量、排名偏好与成绩的本地存储方式</span>
          </button>
        </div>
      </div>
      <div class="settings-actions">
        <button id="closeSettingsButton" type="button">
          <strong>关闭设置</strong>
          <span>返回主菜单或继续当前界面</span>
        </button>
      </div>
    </div>
  </div>

  <div class="overlay hidden" id="resultOverlay">
    <div class="panel">
      <h2 id="resultTitle">System Halted</h2>
      <p class="sub" id="resultSummary"></p>
      <div class="actions">
        <button id="continueButton" class="hidden">
          <strong>从检查点继续</strong>
          <span>保留本局死亡次数与进度</span>
        </button>
        <button id="retryButton">
          <strong>重新开始</strong>
          <span>从当前模式起点重新进入</span>
        </button>
        <button id="menuButton">
          <strong>返回主菜单</strong>
          <span>选择其他关卡或无尽模式</span>
        </button>
      </div>
    </div>
  </div>

  <div class="hint hidden" id="hintText"></div>
  <div class="center-hint hidden" id="centerHint"></div>

  <script>
    const STORAGE_KEY = "pulse-rush-save-v1";

    const LEVELS = [
      {
        id: "tutorial",
        name: "引导关卡",
        subtitle: "30秒 · 学习基础操作",
        duration: 30,
        bpmStart: 80,
        bpmEnd: 80,
        baseSpeed: 300,
        maxSpeed: 300,
        checkpointEvery: 10,
        patternWeights: ["spike", "block"],
        locked: false
      },
      {
        id: "level1",
        name: "关卡 1",
        subtitle: "基础跳跃 · 45 秒",
        duration: 45,
        bpmStart: 100,
        bpmEnd: 120,
        baseSpeed: 430,
        maxSpeed: 620,
        checkpointEvery: 15,
        patternWeights: ["spike", "spike", "block"],
        locked: false
      },
      {
        id: "level2",
        name: "关卡 2",
        subtitle: "尖刺 + 移动平台 · 90 秒",
        duration: 90,
        bpmStart: 140,
        bpmEnd: 162,
        baseSpeed: 480,
        maxSpeed: 720,
        checkpointEvery: 15,
        patternWeights: ["spike", "spike", "block", "moving", "boost", "spike"],
        locked: true
      },
      {
        id: "level3",
        name: "关卡 3",

    const saveData = loadSave();

    function loadSave() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        return {
          records: parsed.records || {},
          totalDeaths: parsed.totalDeaths || 0,
          unlockedLevels: parsed.unlockedLevels || {},
          settings: {
            muted: Boolean(parsed.settings?.muted),
            volume: clamp(Number.isFinite(parsed.settings?.volume) ? parsed.settings.volume : 1, 0, 1),
            participateRanking: parsed.settings?.participateRanking !== false

        };
      } catch {
        return {
          records: {},
          totalDeaths: 0,
          unlockedLevels: {},
          settings: { muted: false, volume: 1, participateRanking: true }
        };
      }
    }

    function persistSave() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saveData));
    }

    function isLevelLocked(level) {
      const saved = saveData.unlockedLevels[level.id];
      if (typeof saved === "boolean") {
        return !saved;
      }
      return Boolean(level.locked);
    }

    function unlockLevel(levelId) {
      saveData.unlockedLevels[levelId] = true;
    }

    function initializeUnlocks() {
      LEVELS.forEach((level) => {
        if (!level.locked) {
          unlockLevel(level.id);
        } else if (typeof saveData.unlockedLevels[level.id] !== "boolean") {
          saveData.unlockedLevels[level.id] = false;
        }
      });
      persistSave();
    }

    function unlockNextLevel(levelId) {
      const currentIndex = LEVELS.findIndex((level) => level.id === levelId);
      const nextLevel = LEVELS[currentIndex + 1];
      if (!nextLevel || !isLevelLocked(nextLevel)) return;
      unlockLevel(nextLevel.id);
      persistSave();
    }

    function setCenterHint(message, visible) {

          state.tutorialMessage = "";
          setCenterHint("", false);

    function showCenterHintMessage(message, duration = 2.2) {

    function pickRandomTipIndex() {
      if (GAME_TIPS.length <= 1) return 0;
      let nextIndex = Math.floor(Math.random() * GAME_TIPS.length);
      while (nextIndex === state.currentTipIndex) {
        nextIndex = Math.floor(Math.random() * GAME_TIPS.length);
      }
      return nextIndex;
    }

    function rotateTip(force = false) {
      if (state.mode !== "playing") return;
      if (!force && state.tipTimer < 3) return;
      state.tipTimer = 0;
      state.currentTipIndex = pickRandomTipIndex();
      hintText.textContent = GAME_TIPS[state.currentTipIndex];
      hintText.classList.remove("hidden");
    }

    function getScore() {
      return Math.max(0, Math.round(state.distance / 8 + state.combo * 25));

    function applyAudioSettings() {
      audioState.muted = Boolean(saveData.settings.muted);
      audioState.volume = clamp(saveData.settings.volume, 0, 1);
      if (audioState.master) {
        audioState.master.gain.value = audioState.muted ? 0 : 0.35 * audioState.volume;
      }
      if (audioState.bgm?.master && audioState.ctx) {
        const now = audioState.ctx.currentTime;
        const target = audioState.muted ? 0.0001 : (audioState.musicOn ? 0.62 : 0.0001) * Math.max(audioState.volume, 0.0001);
        audioState.bgm.master.gain.cancelScheduledValues(now);
        audioState.bgm.master.gain.setValueAtTime(Math.max(audioState.bgm.master.gain.value, 0.0001), now);
        audioState.bgm.master.gain.exponentialRampToValueAtTime(Math.max(target, 0.0001), now + 0.12);
      }
      const icon = audioState.muted ? "🔇" : "🔊";
      soundToggleIcon.textContent = icon;
      menuSoundToggleIcon.textContent = icon;
      volumeSlider.value = String(Math.round(audioState.volume * 100));
      volumeValue.textContent = `${Math.round(audioState.volume * 100)}%`;
    }

    function applyPrivacySettings() {
      rankingToggle.checked = saveData.settings.participateRanking;
      rankingStatus.textContent = saveData.settings.participateRanking ? "参与排名" : "仅本地保存";

    function renderLives() {
